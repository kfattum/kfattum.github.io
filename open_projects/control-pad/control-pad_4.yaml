            condition:
              text_sensor.state:
                id: control_pad_key2
                state: ''
            else: # Если не пустой
              - delay: 200ms
              - text_sensor.template.publish:
                  id: control_pad_key2
                  state: !lambda 'return "";' # Сброс на пустое место

  - platform: template
    name: 'Кнопка 3'
    id: control_pad_key3
    icon: 'mdi:button-pointer'
    on_value: # Когда установлено состояние
      then:
        - if:
            condition:
              text_sensor.state:
                id: control_pad_key3
                state: ''
            else: # Если не пустой
              - delay: 200ms
              - text_sensor.template.publish:
                  id: control_pad_key3
                  state: !lambda 'return "";' # Сброс на пустое место

  - platform: template
    name: 'Кнопка 4'
    id: control_pad_key4
    icon: 'mdi:button-pointer'
    on_value: # Когда установлено состояние
      then:
        - if:
            condition:
              text_sensor.state:
                id: control_pad_key4
                state: ''
            else: # Если не пустой
              - delay: 200ms
              - text_sensor.template.publish:
                  id: control_pad_key4
                  state: !lambda 'return "";' # Сброс на пустое место

  - platform: template
    name: 'Кнопка 4 hold'
    id: control_pad_key4_hold
    icon: 'mdi:button-pointer'

#Кнопка 1
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    id: raw_state_key_1
    internal: true
    filters:
      - invert:
      - delayed_on: 60ms
      - delayed_off: 60ms
    on_multi_click:

      - timing:
          - ON for 70ms to 400ms
          - OFF for at least 330ms
        then:
          - text_sensor.template.publish:
              id: control_pad_key1
              state: !lambda 'return "single";'

      - timing:
          - ON for 70ms to 400ms
          - OFF for 70ms to 300ms
          - ON for 70ms to 400ms
          - OFF for at least 330ms
        then:
          - text_sensor.template.publish:
              id: control_pad_key1
              state: !lambda 'return "double";'

      - timing:
          - ON for 70ms to 400ms
          - OFF for 70ms to 300ms
          - ON for 70ms to 400ms
          - OFF for 70ms to 300ms
          - ON for 70ms to 400ms
          - OFF for at least 50ms
        then:
          - text_sensor.template.publish:
              id: control_pad_key1
              state: !lambda 'return "triple";'

      - timing:
          - ON for at least 1s
        then:
          - text_sensor.template.publish:
              id: control_pad_key1
              state: !lambda 'return "hold";'

