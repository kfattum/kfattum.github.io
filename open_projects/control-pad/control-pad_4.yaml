light:
  - platform: status_led
    name: ${entity_name} sys_status
    pin: GPIO8
    internal: True
    restore_mode: ALWAYS_ON

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true
