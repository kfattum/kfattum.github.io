#https://albert.nz/esphome-button-xiaomi-zigbee
#https://gist.github.com/albertnis/f33066b0b3623a9839a3429c8f19f4d4

substitutions:
  entity_name: "Подстольная панель управления"
  upper_devicename: "control_pad"
esphome:
  name: control_pad
  comment: 4 кнопки
  friendly_name: Подстольная панель управления 

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
  cpu_frequency: 80MHz
    

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome

improv_serial:

wifi:
  power_save_mode: LIGHT
  reboot_timeout: 10min
  output_power: 8.5dB
  # Включите резервную точку доступа (captive portal) на случай сбоя Wi-Fi-соединения
  # ap:
  #   ssid: 
  #   password: 


text_sensor:
  - platform: template
    name: 'Кнопка 1'
    id: control_pad_key1
    icon: 'mdi:button-pointer'
    on_value: # Когда установлено состояние
      then:
        - if:
            condition:
              text_sensor.state:
                id: control_pad_key1
                state: ''
            else: # Если не пустой
              - delay: 200ms
              - text_sensor.template.publish:
                  id: control_pad_key1
                  state: !lambda 'return "";' # Сброс на пустое место

  - platform: template
    name: 'Кнопка 2'
    id: control_pad_key2
    icon: 'mdi:button-pointer'
    on_value: # Когда установлено состояние
      then:
